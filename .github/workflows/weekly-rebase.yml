name: Weekly Rebase

on:
  schedule:
    - cron: '0 2 * * 4'
  workflow_dispatch:
    inputs:
      copilot_model:
        description: 'AI model for Copilot (empty=Auto, gpt-5.4, claude-sonnet-4.5, claude-opus-4.7)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  COPILOT_BOT: copilot-swe-agent[bot]

jobs:
  # ============================================================
  # Job: Rebase main onto upstream-sim
  # ============================================================
  rebase-main:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: main
      # Use upstream-sim branch in the same repo as "upstream"
      UPSTREAM_REF: origin/upstream-sim
    steps:
      - name: Checkout workflow ref (for scripts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Copy rebase scripts to temp
        run: cp -r scripts/rebase "${RUNNER_TEMP}/rebase-scripts"

      - name: Switch to main branch
        run: git checkout -B main origin/main

      - name: Setup Git
        run: |
          git config user.name "rebase-bot"
          git config user.email "rebase-bot@noreply.github.com"

      - name: Fetch all branches
        run: git fetch origin

      - name: Attempt rebase
        id: rebase
        run: |
          OLD_BASE=$(git merge-base HEAD "${{ env.UPSTREAM_REF }}")
          echo "old_base=$OLD_BASE" >> "$GITHUB_OUTPUT"
          DATE_TAG=$(date +%Y%m%d)
          REBASE_BRANCH="rebase_${DATE_TAG}_${{ github.run_id }}_${{ github.run_attempt }}"
          git checkout -b "$REBASE_BRANCH"
          echo "rebase_branch=$REBASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"
          REPORT_FILE="${RUNNER_TEMP}/conflict_report_${{ github.job }}_${{ github.run_id }}.md"
          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
          set +e
          bash "${RUNNER_TEMP}/rebase-scripts/rebase_with_conflict_report.sh" \
            "${{ github.repository }}" "${{ env.BRANCH_NAME }}" "${{ env.UPSTREAM_REF }}" \
            "$REBASE_BRANCH" "$REPORT_FILE"
          REBASE_EXIT=$?
          set -e
          if [[ $REBASE_EXIT -eq 0 ]]; then
            echo "rebase_ok=true" >> "$GITHUB_OUTPUT"
          elif [[ $REBASE_EXIT -eq 2 ]]; then
            # Rebase completed linearly but has conflict markers
            echo "rebase_ok=conflict" >> "$GITHUB_OUTPUT"
          else
            echo "rebase_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebase branch
        if: steps.rebase.outputs.rebase_ok == 'true'
        run: git push origin "${{ steps.rebase.outputs.rebase_branch }}"

      - name: Generate upstream commit report
        if: steps.rebase.outputs.rebase_ok == 'true'
        id: commits
        run: |
          OLD_BASE="${{ steps.rebase.outputs.old_base }}"
          NEW_BASE=$(git merge-base HEAD "${{ env.UPSTREAM_REF }}")
          COMMIT_COUNT=$(git rev-list --count "${OLD_BASE}..${NEW_BASE}" 2>/dev/null || echo 0)
          COMMIT_FILE="${RUNNER_TEMP}/commit_list.txt"
          if [[ "$COMMIT_COUNT" -gt 0 ]]; then
            git log --oneline --no-merges "${OLD_BASE}..${NEW_BASE}" | head -100 > "$COMMIT_FILE"
            if [[ "$COMMIT_COUNT" -gt 100 ]]; then
              echo "... and $((COMMIT_COUNT - 100)) more commits" >> "$COMMIT_FILE"
            fi
          else
            echo "No new upstream commits." > "$COMMIT_FILE"
          fi
          echo "new_base=$NEW_BASE" >> "$GITHUB_OUTPUT"
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          echo "commit_file=$COMMIT_FILE" >> "$GITHUB_OUTPUT"

      - name: Create rebase PR
        if: steps.rebase.outputs.rebase_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 "${RUNNER_TEMP}/rebase-scripts/generate_pr_body.py" \
            "main" \
            "${{ steps.commits.outputs.commit_count }}" \
            "${{ steps.rebase.outputs.old_base }}" \
            "${{ steps.commits.outputs.new_base }}" \
            "${{ steps.rebase.outputs.date_tag }}" \
            "${{ env.BRANCH_NAME }}" \
            "${{ steps.commits.outputs.commit_file }}" \
            > "${RUNNER_TEMP}/pr_body.md"
          PR_BODY=$(cat "${RUNNER_TEMP}/pr_body.md")
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/pulls" \
            -f title="Weekly rebase onto upstream-sim (${{ steps.rebase.outputs.rebase_branch }})" \
            -f body="$PR_BODY" \
            -f head="${{ steps.rebase.outputs.rebase_branch }}" \
            -f base="${{ env.BRANCH_NAME }}"

      - name: Prepare conflict branch
        if: steps.rebase.outputs.rebase_ok == 'conflict'
        id: conflict
        run: |
          # Rebase already completed linearly (exit 2) — just rename and push
          CONFLICT_BRANCH="conflict/rebase_${{ steps.rebase.outputs.date_tag }}_${{ github.run_id }}_${{ github.run_attempt }}"
          git branch -m "$CONFLICT_BRANCH"
          git push origin "$CONFLICT_BRANCH"
          echo "conflict_branch=$CONFLICT_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create Issue and assign Copilot
        if: steps.rebase.outputs.rebase_ok == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 "${RUNNER_TEMP}/rebase-scripts/generate_issue_body.py" \
            "[Auto Rebase] main conflict ${{ steps.rebase.outputs.date_tag }}" \
            "${{ steps.rebase.outputs.report_file }}" \
            "${{ steps.conflict.outputs.conflict_branch }}" \
            "${{ env.BRANCH_NAME }}" \
            "${{ steps.rebase.outputs.date_tag }}" \
            "${{ env.COPILOT_BOT }}" \
            "${{ github.repository }}" \
            "Resolve all merge conflicts. Prefer upstream, preserve Intel-specific code. PR target: ${{ env.BRANCH_NAME }}." \
            "${{ github.event.inputs.copilot_model }}" \
            > "${RUNNER_TEMP}/issue_payload.json"
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues" \
            --input "${RUNNER_TEMP}/issue_payload.json"
